<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-circle shape-1"></div>
    <div class="glow-circle shape-2"></div>

    <div id="login-section" class="container active-section">
        <div class="glass-card login-box slide-up">
            <h2 class="gradient-text">Welcome Back</h2>
            <p class="subtitle">Sign in to continue</p>
            <p id="login-error" class="error-text"></p>
            
            <form id="login-form">
                <div class="input-group">
                    <input type="email" id="email" required placeholder=" " autocomplete="off">
                    <label>Email address</label>
                </div>
                <div class="input-group">
                    <input type="password" id="password" required placeholder=" " autocomplete="off">
                    <label>Password</label>
                </div>
                <button type="submit" class="btn-primary" id="login-btn">
                    <span>Sign In</span>
                </button>
            </form>
        </div>
    </div>

    <div id="dashboard-section" class="container" style="display: none;">
        <nav class="glass-nav fade-in">
            <div class="nav-left">
                <h2 class="gradient-text">Dashboard</h2>
                <span id="user-role" class="badge"></span>
            </div>
            <button id="logout-btn" class="btn-outline">Logout</button>
        </nav>

        <div id="task-board" class="task-grid slide-up">
            </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
